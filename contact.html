<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="cnt-page-title">კონტაქტი | AQUA MASTER</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ენის ღილაკების სტილი ნავბარისთვის */
        .lang-switcher {
            display: inline-flex;
            gap: 6px;
            margin-left: 15px;
            align-items: center;
        }
        .lang-btn {
            background: transparent;
            color: var(--text-color, #fff);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 2px 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .lang-btn.active-lang {
            background-color: #38bdf8;
            color: #fff;
            border-color: #38bdf8;
        }
        @media (max-width: 768px) {
            .lang-switcher {
                margin: 15px 0;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">AQUA<span> MASTER</span></a>
            <div class="burger">☰</div>
            <nav class="nav-links">
                <a href="index.html" data-translate="nav-home">მთავარი</a>
                <a href="services.html" data-translate="nav-services">სერვისები</a>
                <a href="equipment.html" data-translate="nav-equipment">ტექნიკა</a>
                <a href="gallery.html" data-translate="nav-gallery">გალერეა</a>
                <a href="contact.html" class="active" data-translate="nav-contact">კონტაქტი</a>
                <div id="theme-toggle" class="theme-toggle">◑</div>
                
                <!-- ენის გადასართველი მენიუ ნავბარში -->
                <div class="lang-switcher">
                    <button onclick="changeLanguage('ka')" id="btn-ka" class="lang-btn active-lang">KA</button>
                    <button onclick="changeLanguage('en')" id="btn-en" class="lang-btn">EN</button>
                    <button onclick="changeLanguage('ru')" id="btn-ru" class="lang-btn">RU</button>
                </div>
            </nav>
        </div>
    </header>

    <div class="container section-padding">
        <h1 style="text-align:center; margin-bottom:50px" data-translate="cnt-main-title">დაგვიკავშირდით</h1>
        <div class="contact-grid">
            <div class="contact-card">
                <i class="fas fa-phone-alt contact-icon" style="color:var(--primary)"></i>
                <h3 data-translate="cnt-phone">ტელეფონი</h3>
                <a href="tel:+995598553755" class="btn-action" data-translate="cnt-btn-call">დარეკვა</a>
            </div>
            <div class="contact-card">
                <i class="fab fa-whatsapp contact-icon" style="color:#22c55e"></i>
                <h3>WhatsApp</h3>
                <a href="https://wa.me/995598553755" target="_blank" class="btn-action" style="background:#22c55e" data-translate="cnt-btn-wa">მიწერა</a>
            </div>
            <div class="contact-card">
                <i class="fas fa-envelope contact-icon" style="color:#f59e0b"></i>
                <h3>Email</h3>
                <a href="mailto:robakidze.giorgi@yahoo.com" class="btn-action" style="background:#f59e0b" data-translate="cnt-btn-mail">გაგზავნა</a>
            </div>
            <div class="contact-card" style="position: relative; z-index: 10;">
                <i class="fab fa-facebook-f contact-icon" style="color:#1877f2"></i>
                <h3>Facebook</h3>
                <a href="https://www.facebook.com/PROPLUMB.GE" target="_blank" class="btn-action" style="background:#1877f2; position: relative; z-index: 11;" data-translate="cnt-btn-fb">გვერდი</a>
            </div>
        </div>
    </div>
    
    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
