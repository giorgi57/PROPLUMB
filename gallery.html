    <link rel="stylesheet" href="style.css">

    <style>
        /* ენის ღილაკების სტილი ნავბარისთვის */
        .lang-switcher {
            display: inline-flex;
            gap: 6px;
            margin-left: 15px;
            align-items: center;
        }
        .lang-btn {
            background: transparent;
            color: var(--text-color, #fff);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 2px 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .lang-btn.active-lang {
            background-color: #38bdf8;
            color: #fff;
            border-color: #38bdf8;
        }
        @media (max-width: 768px) {
            .lang-switcher {
                margin: 15px 0;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

                <!-- ენის გადასართველი მენიუ ნავბარში -->
                <div class="lang-switcher">
                    <button onclick="changeLanguage('ka')" id="btn-ka" class="lang-btn active-lang">KA</button>
                    <button onclick="changeLanguage('en')" id="btn-en" class="lang-btn">EN</button>
                    <button onclick="changeLanguage('ru')" id="btn-ru" class="lang-btn">RU</button>
                </div>
            </nav>
        </div>
